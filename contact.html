<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Contact | Melissa Kinsey</title>

    <script
      src="https://code.jquery.com/jquery-3.3.1.js"
      integrity="sha256-2Kok7MbOyxpgUVvAk/HJ2jigOSYS2auK4Pfzbm7uH60="
      crossorigin="anonymous"
    ></script>

    <script>
      fetch("head-common.html")
        .then((response) => response.text())
        .then((data) => {
          document.head.insertAdjacentHTML("beforeend", data);
        });
    </script>

    <script>
      $(function () {
        $("#header").load("header.html");
        $("#footer").load("footer.html");
      });
    </script>

    <style>
      .contact-hero {
        background-color: #e4fdf4;
        padding: 2rem 1.5rem 2.5rem;
      }

      .contact-wrap {
        max-width: 1080px;
        margin: 0 auto;
      }

      .name-lockup {
        text-align: center;
        margin-bottom: 1.75rem;
      }

      .name-image {
        width: min(100%, 620px);
        max-width: 100%;
        height: auto;
        margin: 0 auto;
        display: block;
      }

      .bio-row {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: center;
        gap: 2.25rem;
      }

      .photo-col {
        flex: 0 1 360px;
        max-width: 360px;
      }

      .profile-photo {
        width: 100%;
        max-width: 100%;
        height: auto;
        display: block;
        border: 3px solid rgba(117, 184, 163, 0.25);
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
      }

      .bio-col {
        flex: 1 1 520px;
        max-width: 600px;
      }

      .bio-copy {
        font-size: clamp(1.2rem, 1rem + 0.7vw, 1.45rem);
        line-height: 1.7;
        text-align: left;
      }

      .bio-copy p {
        margin: 0 0 1rem;
      }

      .bio-copy p:last-child {
        margin-bottom: 0;
      }

      .icon-row {
        margin: 2rem auto 0;
        max-width: 900px;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 1rem 3rem;
        padding-top: 0.25rem;
      }

      .icon-link a {
        display: inline-flex;
        align-items: center;
        gap: 0.65rem;
        font-size: clamp(1.2rem, 1rem + 0.5vw, 1.4rem);
        color: #6aa28f;
        text-decoration: none;
      }

      .icon-link a:hover,
      .icon-link a:focus {
        opacity: 0.9;
        text-decoration: none;
      }

      .icon-link img {
        width: 30px;
        height: 30px;
        object-fit: contain;
      }

      @media (max-width: 767.98px) {
        .contact-hero {
          padding: 1.75rem 1rem 2rem;
        }
